<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio · Ilan Auzunbud</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        
        body {
            background-color: #081b29; 
            color: white;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .azul-llan {
            color: #00abf0; 
        }

        
        .header-personalizado {
            padding: 20px 0;
        }

        .nav-link {
            color: white !important;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #00abf0 !important;
        }

        
        .perfil-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #00abf0;
            object-fit: cover; 
            margin-bottom: 20px;
        }

        
        .btn-custom {
            background-color: #00abf0;
            color: #081b29;
            font-weight: 600;
            border: none;
            padding: 10px 30px;
        }

        .btn-custom:hover {
            background-color: white;
            color: #00abf0;
        }

        
        section {
            padding: 100px 0;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        
        .social-media a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            border: 2px solid #00abf0;
            border-radius: 50%;
            font-size: 25px;
            color: #00abf0;
            text-decoration: none;
            margin: 0 10px;
            transition: 0.4s;
        }

        .social-media a:hover {
            border-color: white;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container d-flex w-100 h-100 flex-column">

        <header class="header-personalizado d-flex justify-content-between align-items-center">
            <h3 class="mb-0 fw-bold azul-llan">Ilan</h3>
            <nav class="nav">
                <a class="nav-link fw-bold" href="#inicio">Inicio</a>
                <a class="nav-link fw-bold" href="#proyectos">Proyectos</a>
                <a class="nav-link fw-bold" href="#contacto">Contacto</a>
            </nav>
        </header>

        <section id="inicio">
            <img src="perfil.jpg" class="perfil-img" alt="Ilan Perfil">
            <h1 class="display-4 fw-bold">Hola, soy Ilan Auzunbud</h1>
            <h2 class="h3">Fundamentos de la programación</h2>
            <p class="lead mt-3">Estudio en la escuela <strong>ORT Rosario</strong>.</p>
            
            <div class="social-media mt-3 mb-4">
                <a href="https://linkedin.com" target="_blank"><i class='bx bxl-linkedin'></i></a>
                <a href="https://github.com" target="_blank"><i class='bx bxl-github'></i></a>
                <a href="https://instagram.com" target="_blank"><i class='bx bxl-instagram'></i></a>
            </div>

            <a href="#proyectos" class="btn btn-custom btn-lg">Ver Proyectos</a>
        </section>

        <section id="proyectos">
            <h2 class="display-5 fw-bold mb-4">Mis Proyectos</h2>
            <div class="row w-100 justify-content-center">
                <div class="col-md-6 border border-info p-4 rounded">
                    <h3 class="h4">Portfolio con Bootstrap</h3>
                    <h3 class="h4">Charla TED</h3>
                    <p class="text-secondary small">HTML · CSS · Bootstrap</p>
                </div>
            </div>
        </section>

        <section id="contacto">
            <h2 class="display-5 fw-bold mb-4">Contacto</h2>
            <p class="azul-llan fs-4 mt-3">50241697@escuelabialik.edu.ar</p>
        </section>

        

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
