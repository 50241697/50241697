<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio · Ilan Auzunbud</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        
        body {
            background-color: #081b29;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            scroll-behavior: smooth;
        }

        .contenedor {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .texto-azul {
            color: #00abf0;
        }

        
        .header-principal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }


        .nav-links {

        display: flex;
        gap: 15px;
        }

    

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-left: 30px;
            transition: 0.3s;

            width: 100px;
            height: 50px;
            background-color: #00abf0;
            border-radius: 15px;

            display: flex;
            justify-content: center;
            align-items: center;

        }

        .nav-links a:hover {
            color: #00abf0;
        }

        /* Secciones */
        .seccion {
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 80vh;
        }

        
        .foto-perfil {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid #00abf0;
            object-fit: cover;
            margin-bottom: 25px;
        }

        .titulo-grande {
            font-size: 3.5rem;
            margin: 10px 0;
        }

        .subtitulo {
            font-size: 1.5rem;
            color: #00abf0;
        }

        
        .btn-proyectos {
            background-color: #00abf0;
            color: #081b29;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 25px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-proyectos:hover {
            background-color: white;
            color: #00abf0;
        }

        /* Redes Sociales */
        .redes-sociales {
            margin: 25px 0;
        }

        .redes-sociales a {
            font-size: 28px;
            color: #00abf0;
            border: 2px solid #00abf0;
            width: 50px;
            height: 50px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin: 0 10px;
            text-decoration: none;
            transition: 0.4s;
        }

        .redes-sociales a:hover {
            color: white;
            border-color: white;
            transform: translateY(-5px);
        }

        
        .caja-proyectos {
            border: 2px solid #00abf0;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .proyecto-item {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

    </style>
</head>

<body>

    <div class="contenedor">
        
        <header class="header-principal">
            <h2 class="texto-azul">Portfolio</h2>
            <nav class="nav-links">
                <a href="#inicio">Inicio</a>
                <a href="#proyectos">Proyectos</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </header>

        <section id="inicio" class="seccion">
            <img src="perfil.jpg" class="foto-perfil" alt="Ilan Perfil">
            <h1 class="titulo-grande">Ilan Auzunbud</h1>
            <p class="subtitulo">Fundamentos de la programación</p>
            <p>Estudio en la escuela <strong>ORT Rosario</strong>.</p>
            
            <div class="redes-sociales">
                <a href="https://linkedin.com" target="_blank"><i class='bx bxl-linkedin'></i></a>
                <a href="https://github.com" target="_blank"><i class='bx bxl-github'></i></a>
                <a href="https://instagram.com" target="_blank"><i class='bx bxl-instagram'></i></a>
            </div>

            <a href="#proyectos" class="btn-proyectos">Ver Proyectos</a>
        </section>

        <section id="proyectos" class="seccion">
            <h2 class="titulo-grande">Mis Proyectos</h2>
            <div class="caja-proyectos">
                <div class="proyecto-item">Portfolio con Bootstrap</div>
                <div class="proyecto-item">Charla TED</div>
                <p style="color: #888;">Tecnologías: HTML · CSS · Bootstrap</p>
            </div>
        </section>

        <section id="contacto" class="seccion">
            <h2 class="titulo-grande">Contacto</h2>
            <p class="texto-azul" style="font-size: 1.5rem;">50241697@escuelabialik.edu.ar</p>
        </section>

    </div>

</body>
</html>
